# CD: Publish to skill distribution domains on merge to main
# Domain registry: doc/SKILL_DOMAINS.md
name: Publish Skills

on:
  push:
    branches: [main]

jobs:
  publish-clawhub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install clawhub
        run: npm install -g clawhub

      # Workaround: clawhub v0.7.0 does not send acceptLicenseTerms (clawhub#660)
      - name: Patch clawhub for acceptLicenseTerms
        run: |
          CLAWHUB_PUBLISH="$(npm root -g)/clawhub/dist/cli/commands/publish.js"
          if ! grep -q "acceptLicenseTerms" "$CLAWHUB_PUBLISH"; then
            node -e "
              const fs = require('fs');
              const p = require('path');
              const root = require('child_process').execSync('npm root -g', { encoding: 'utf8' }).trim();
              const file = p.join(root, 'clawhub/dist/cli/commands/publish.js');
              let c = fs.readFileSync(file, 'utf8');
              c = c.replace('tags,\n            ...(forkOf', 'tags,\n            acceptLicenseTerms: true,\n            ...(forkOf');
              fs.writeFileSync(file, c);
            "
          fi

      - name: Login to ClawHub
        run: clawhub login --token "${{ secrets.CLAWHUB_TOKEN }}" --no-browser

      - name: Publish
        run: |
          VERSION="1.0.${{ github.run_number }}"
          CHANGELOG="CD: ${{ github.sha }}"
          clawhub publish . \
            --slug uninstaller \
            --name "Uninstaller" \
            --version "$VERSION" \
            --changelog "$CHANGELOG" \
            --tags latest

  # Sundial Hub: Claude, Cursor, Gemini, Codex, etc. (see doc/SKILL_DOMAINS.md)
  # Sundial has no --token; interactive login only. Job skips when SUNDIAL_TOKEN unset.
  publish-sundial:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Publish to Sundial
        env:
          SUNDIAL_TOKEN: ${{ secrets.SUNDIAL_TOKEN }}
        run: |
          if [ -z "$SUNDIAL_TOKEN" ]; then
            echo "Skipping Sundial (SUNDIAL_TOKEN not set). Add secret to enable."
            exit 0
          fi
          npx sundial-hub push . || echo "Sundial push failed; check sundialhub.com/docs for CI auth"

  # GitHub Copilot: .github/skills/ structure. Verify root SKILL.md matches.
  verify-copilot-skill:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify Copilot skill in sync
        run: |
          diff SKILL.md .github/skills/uninstaller/SKILL.md || {
            echo "::error::SKILL.md and .github/skills/uninstaller/SKILL.md must match. Run: cp SKILL.md .github/skills/uninstaller/SKILL.md"
            exit 1
          }
          echo "✅ Copilot skill in sync"

  # ghcr.io (OCI): Any agent using OCI registries. Uses GITHUB_TOKEN (auto-provided).
  publish-ghcr:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Publish to ghcr.io
        uses: andrewhowdencom/skr@main
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          namespace: ${{ github.repository_owner }}
          path: .

  # SkillCreator.ai: Add when SKILLCREATOR_TOKEN available (creator approval required).
  publish-skillcreator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Publish to SkillCreator
        env:
          SKILLCREATOR_TOKEN: ${{ secrets.SKILLCREATOR_TOKEN }}
        run: |
          if [ -z "$SKILLCREATOR_TOKEN" ]; then
            echo "Skipping SkillCreator (SKILLCREATOR_TOKEN not set). Apply at skillcreator.ai/creators when available."
            exit 0
          fi
          echo "SkillCreator publish: add CLI command when docs available"
          exit 0
